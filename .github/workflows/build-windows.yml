name: Build Instarzinho Windows .exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Permite rodar manualmente pelo site do GitHub

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        working-directory: client
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 requests pyinstaller

      - name: Compilar com PyInstaller
        working-directory: client
        run: |
          pyinstaller instarzinho.spec

      - name: Upload do executável
        uses: actions/upload-artifact@v4
        with:
          name: Instarzinho-Windows
          path: client/dist/Instarzinho.exe
          retention-days: 30
